<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nexus Dynamics | Secure Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="grid"></div>

<!-- Boot Screen -->
<div id="bootScreen" class="boot">
  <h1>NX SYSTEM INITIALIZING...</h1>
  <p id="bootText"></p>
</div>

<!-- Login -->
<div class="container" id="loginBox">
  <div class="card">
    <h2>Nexus Dynamics</h2>
    <p class="sub">Internal Employee Database</p>

    <div class="alert">
      AUTHORIZED PERSONNEL ONLY<br>
      SYSTEM-7 MONITORING ACTIVE
    </div>

    <input type="text" id="id" placeholder="Employee ID">
    <input type="password" id="pass" placeholder="Password">

    <button onclick="login()">Access Database</button>

    <p id="error"></p>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="hidden">
  <div class="dash">
    <h2>ACCESS GRANTED</h2>
    <p>Welcome to Nexus Archive</p>

    <div class="files">
      <div class="file" onclick="openFile(1)">staff_registry.log</div>
      <div class="file" onclick="openFile(2)">security_memo.txt</div>
      <div class="file danger" onclick="openFile(3)">vault_override.enc</div>
    </div>

    <div id="viewer">
      <p>Select a file...</p>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
