<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nexus Dynamics | Corrupted Node</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="grid"></div>
<div class="glitch-overlay"></div>

<!-- LOGIN -->
<div class="container" id="loginBox">
  <div class="card glitch-card">
    <h1 class="glitch" data-text="NEXUS DYNAMICS">NEXUS DYNAMICS</h1>
    <p class="sub">Corrupted Internal Access Node</p>

    <div class="alert">
      ⚠ SYSTEM-7 WARNING<br>
      DATA INTEGRITY COMPROMISED
    </div>

    <input type="text" id="id" placeholder="Employee ID">
    <input type="password" id="pass" placeholder="Password">

    <button onclick="login()">ACCESS SYSTEM</button>

    <p id="error"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
  <div class="dash">

    <h2 class="glitch" data-text="ACCESS GRANTED">ACCESS GRANTED</h2>
    <p>Recovered Nexus Archive (Partial)</p>

    <div class="files">
      <div class="file" onclick="openFile(1)">staff_registry.log</div>
      <div class="file" onclick="openFile(2)">security_memo.txt</div>
      <div class="file danger" onclick="openFile(3)">vault_override.enc</div>
    </div>

    <div id="viewer" class="glitch-viewer">
      <p>> waiting for input...</p>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
